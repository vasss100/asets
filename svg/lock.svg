<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="lockGlassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.65" />
      <stop offset="40%" stop-color="#1e40af" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.98" />
    </linearGradient>

    <linearGradient id="darkHoleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>

    <linearGradient id="lockBorderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffff" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>

    <filter id="lock3dShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="15" stdDeviation="12" flood-color="#000000" flood-opacity="0.75" />
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#3b82f6" flood-opacity="0.45" />
    </filter>

    <filter id="lockNoise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.12" />
      </feComponentTransfer>
    </filter>
  </defs>

  <circle cx="150" cy="150" r="70" fill="#3b82f6" opacity="0.2" filter="blur(40px)" />

  <g filter="url(#lock3dShadow)">
    
    <path d="M 90,130 V 90 C 90,50 210,50 210,90 V 130" 
          fill="none" stroke="url(#lockGlassGrad)" stroke-width="20" stroke-linecap="round" />
    <path d="M 90,130 V 90 C 90,50 210,50 210,90 V 130" 
          fill="none" stroke="#00ffff" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.3" pointer-events="none" />
      
    <rect x="55" y="120" width="190" height="140" rx="30" ry="30" 
          fill="url(#lockGlassGrad)" stroke="url(#lockBorderGrad)" stroke-width="4.5" />
      
    <rect x="55" y="120" width="190" height="140" rx="30" ry="30" 
          filter="url(#lockNoise)" opacity="0.4" pointer-events="none" />

    <rect x="63" y="128" width="174" height="124" rx="22" ry="22" 
          fill="none" stroke="#FFFFFF" stroke-width="1.2" stroke-opacity="0.2" pointer-events="none" />
      
    <g transform="translate(150, 185)">
      <circle cx="0" cy="-5" r="14" fill="url(#darkHoleGrad)" stroke="#1e40af" stroke-width="1" />
      <path d="M -7,2 L 7,2 L 12,32 L -12,32 Z" fill="url(#darkHoleGrad)" stroke="#1e40af" stroke-width="1" />
      
      <circle cx="0" cy="-5" r="9" fill="#020617" />
      <path d="M -5,4 L 5,4 L 8,28 L -5,28 Z" fill="#020617" />
    </g>

  </g>
</svg>