<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" width="520" height="320">
  <defs>
    <linearGradient id="cyberBlueGlassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F2027" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#203A43" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.98" />
    </linearGradient>

    <linearGradient id="ultraMultiBorder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" /> <stop offset="25%" stop-color="#00ffff" /> <stop offset="50%" stop-color="#FFF000" /> <stop offset="75%" stop-color="#32CD32" /> <stop offset="100%" stop-color="#FF007F" /> </linearGradient>

    <linearGradient id="fixedNeonTextGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="40%" stop-color="#3b82f6" /> <stop offset="80%" stop-color="#32CD32" /> <stop offset="100%" stop-color="#FFF000" /> </linearGradient>

    <filter id="finalGlowShadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="18" stdDeviation="15" flood-color="#000000" flood-opacity="0.8" />
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#3b82f6" flood-opacity="0.6" />
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#FF007F" flood-opacity="0.5" />
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#FFF000" flood-opacity="0.4" />
    </filter>

    <filter id="ultraNoise">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.14" />
      </feComponentTransfer>
    </filter>
  </defs>

  <circle cx="150" cy="150" r="100" fill="#3b82f6" opacity="0.3" filter="blur(55px)" />
  <circle cx="370" cy="170" r="100" fill="#FF007F" opacity="0.25" filter="blur(55px)" />

  <g filter="url(#finalGlowShadow)">
    
    <rect x="80" y="80" width="360" height="160" rx="80" ry="80" fill="url(#cyberBlueGlassGrad)" stroke="url(#ultraMultiBorder)" stroke-width="5" />

    <rect x="80" y="80" width="360" height="160" rx="80" ry="80" filter="url(#ultraNoise)" opacity="0.45" pointer-events="none" />

    <g filter="drop-shadow(0px 6px 9px rgba(0,0,0,0.7))">
      <text x="260" y="172" text-anchor="middle" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="65" fill="url(#fixedNeonTextGrad)" stroke="#FFFFFF" stroke-width="1.2" letter-spacing="3" text-rendering="geometricPrecision">PLAY</text>
    </g>
    
  </g>
</svg>