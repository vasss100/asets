<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" width="520" height="320">
  <defs>
    <linearGradient id="yellowGlassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF500" stop-opacity="0.7" />
      <stop offset="50%" stop-color="#FFD21E" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#4A3B00" stop-opacity="0.98" />
    </linearGradient>

    <linearGradient id="yellowNeonBorder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="30%" stop-color="#FFF500" />
      <stop offset="70%" stop-color="#FF9F0A" />
      <stop offset="100%" stop-color="#CC8400" />
    </linearGradient>

    <linearGradient id="yellowTopShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0" />
    </linearGradient>

    <filter id="yellowGlowShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="15" flood-color="#000000" flood-opacity="0.75" />
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#FFD21E" flood-opacity="0.55" />
    </filter>

    <filter id="yellowGlassNoise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.12" />
      </feComponentTransfer>
    </filter>
  </defs>

  <ellipse cx="260" cy="160" rx="170" ry="75" fill="#FFD21E" opacity="0.22" filter="blur(50px)" />

  <g filter="url(#yellowGlowShadow)">
    
    <rect x="80" y="80" width="360" height="160" rx="80" ry="80" fill="url(#yellowGlassGrad)" stroke="url(#yellowNeonBorder)" stroke-width="5" />

    <rect x="80" y="80" width="360" height="160" rx="80" ry="80" filter="url(#yellowGlassNoise)" opacity="0.4" pointer-events="none" />

    <rect x="86" y="86" width="348" height="148" rx="74" ry="74" fill="none" stroke="#FFF9A6" stroke-width="1.5" stroke-opacity="0.3" pointer-events="none" />

    <path d="M 110,110 
             C 160,86 360,86 410,110 
             C 350,135 170,135 110,110 Z" 
          fill="url(#yellowTopShine)" pointer-events="none" />

  </g>
</svg>