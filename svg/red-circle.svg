<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="circleRedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF1E1E" />
      <stop offset="35%" stop-color="#D60A0A" />
      <stop offset="70%" stop-color="#8A0303" />
      <stop offset="100%" stop-color="#4A0000" />
    </linearGradient>

    <linearGradient id="circleTopGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85" />
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0" />
    </linearGradient>

    <linearGradient id="circleBottomReflex" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FF9999" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#FF9999" stop-opacity="0.0" />
    </linearGradient>

    <filter id="circleShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="5" flood-color="#000000" flood-opacity="0.5" />
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <circle cx="60" cy="60" r="45" fill="url(#circleRedGrad)" filter="url(#circleShadow)" />

  <circle cx="60" cy="60" r="44.5" fill="none" stroke="#3A0000" stroke-width="1.8" opacity="0.6" />

  <circle cx="60" cy="60" r="43.5" fill="none" stroke="#FF8585" stroke-width="1.2" stroke-opacity="0.5" />

  <path d="M 17.5,50 
           A 43.5,43.5 0 0,1 102.5,50 
           C 85,58 35,58 17.5,50 Z" 
        fill="url(#circleTopGlow)" />

  <path d="M 23,75 
           A 43.5,43.5 0 0,0 97,75 
           C 80,68 40,68 23,75 Z" 
        fill="url(#circleBottomReflex)" />

  <ellipse cx="40" cy="28" rx="7" ry="3.5" fill="#FFFFFF" opacity="0.75" transform="rotate(-20 40 28)" />
</svg>